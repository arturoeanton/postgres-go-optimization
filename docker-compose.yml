# docker-compose.yml
#
# Stack mínimo para demos y CI:
#   - postgres: servidor PostgreSQL oficial (versión pineada) con datos
#     seed que ejercitan todas las reglas (schema-aware y EXPLAIN).
#
# Uso:
#   docker compose up -d
#   export PGOPT_DB="postgres://pgopt:pgopt@localhost:55432/pgopt?sslmode=disable"
#   ./pgopt --db "$PGOPT_DB" testdata/bad/select_star.sql
#   docker compose down -v   # limpia volumenes
#
# El puerto expuesto es 55432 (no 5432) para no chocar con un PostgreSQL
# local que ya tengas corriendo. Cambialo si querés.

services:
  postgres:
    image: postgres:17-alpine
    container_name: pgopt-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pgopt
      POSTGRES_USER: pgopt
      POSTGRES_PASSWORD: pgopt
      # Activar pg_stat_statements desde el arranque
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "55432:5432"
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements,auto_explain"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "auto_explain.log_min_duration=100ms"
      - "-c"
      - "auto_explain.log_analyze=on"
      - "-c"
      - "auto_explain.log_buffers=on"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "max_parallel_workers_per_gather=4"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./docker/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - pgopt-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgopt -d pgopt"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgopt-data:
